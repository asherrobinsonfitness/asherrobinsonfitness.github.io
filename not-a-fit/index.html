<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
    <title>Not a Fit</title>
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <!-- Standard Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/QNSK2T81/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/fW5SG9z9/favicon-16x16.png">

    <!-- JPG fallback favicon -->
    <link rel="shortcut icon" href="https://i.postimg.cc/7Y6JwZhJ/favicon.jpg">

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/jqvnp7xz/apple-touch-icon.png">

    <!-- Android / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/xjgNwzfq/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://i.postimg.cc/BQ6P4nbK/android-chrome-512x512.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --space-5: 2.5rem;
            --text: #f8fafc;
            --muted: #a0a0a0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
            font-display: swap;
        }

        body {
            color: var(--text);
            line-height: 1.5;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            background: #1c1c1c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .headline {
            font-size: 1.75rem;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -.02em;
            color: var(--text);
            margin-top: 0.5rem;
            margin-bottom: 1rem;
        }

        .not-a-fit-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-5) 1.5rem;
        }

        .not-a-fit-inner {
            width: 100%;
            max-width: 420px;
        }

        .naf-icon {
            margin-bottom: 1.25rem;
        }

        .naf-reason {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.09);
            border-radius: 10px;
            padding: 0.875rem 1.125rem;
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .naf-reason-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 600;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            color: #6b7280;
            margin-bottom: 0.5rem;
        }

        .naf-reason-question {
            font-size: 0.875rem;
            line-height: 1.5;
            color: #9ca3af;
            margin-bottom: 0.3rem;
        }

        .naf-reason-answer {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text);
        }

        .naf-body {
            font-size: 1rem;
            line-height: 1.6;
            letter-spacing: -.005em;
            color: var(--muted);
            max-width: 450px;
            margin: 0.25rem auto 1.25rem;
        }

        @media (min-width: 1024px) {
            .headline {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <main class="not-a-fit-main">
        <div class="not-a-fit-inner">
            <div class="naf-icon" aria-hidden="true">
                <svg width="54" height="54" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="27" cy="27" r="27" fill="#ef4444"/>
                    <path d="M18 18L36 36M36 18L18 36" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="headline">This program isn’t the right fit</h1>
            <p class="naf-body" id="naf-body"></p>
            <div class="naf-reason" id="naf-reason">
                <p class="naf-reason-question" id="naf-question"></p>
                <p class="naf-reason-answer" id="naf-answer"></p>
            </div>
        </div>
    </main>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search || "");
            var goal = params.get("goal");
            var age = params.get("age");
            var gym = params.get("gym");
            var commitment = params.get("commitment");

            var question = "";
            var answer = "";
            var explanation = "";

            if (goal === "build_muscle" || goal === "improve_fitness" || goal === "not_sure") {
                var goalLabels = { "build_muscle": "Build muscle", "improve_fitness": "Improve general fitness", "not_sure": "Not sure" };
                question = "What is your top fitness goal?";
                answer = goalLabels[goal] || goal;
                explanation = "This is a fat loss program. If that’s not your goal right now, I’m not the right coach for you.";
            } else if (age === "17_or_younger") {
                question = "What’s your age?";
                answer = "17 or younger";
                explanation = "I work with men 18 and older. Come back when that changes.";
            } else if (age === "55_or_older") {
                question = "What’s your age?";
                answer = "55 or older";
                explanation = "My coaching is built for men under 55. The targets and methods aren’t designed for your age range, and I’d rather be upfront than take your money and underdeliver.";
            } else if (gym === "no" || gym === "home") {
                var gymLabels = { "no": "No", "home": "I have weight equipment at home" };
                question = "Do you have access to a gym?";
                answer = gymLabels[gym] || gym;
                explanation = "The training side of this program requires a commercial gym. Without it, I can’t get you the results I’d need to stand behind. If you get access to a gym, come back and reapply.";
            } else if (commitment === "maybe" || commitment === "no") {
                var commitmentLabels = { "maybe": "Maybe", "no": "No" };
                question = "Are you willing to track your food, body weight, and workouts?";
                answer = commitmentLabels[commitment] || commitment;
                explanation = "Tracking food, bodyweight, and workouts isn’t optional. It’s how the program works. If you’re not ready for that, the results won’t be there. Come back when you are.";
            } else {
                explanation = "Based on your answers, this program isn’t the right fit for you right now.";
            }

            if (question && answer) {
                document.getElementById("naf-question").textContent = question;
                document.getElementById("naf-answer").textContent = answer;
            } else {
                document.getElementById("naf-reason").style.display = "none";
            }

            document.getElementById("naf-body").textContent = explanation;
        })();
    </script>
</body>

</html>
