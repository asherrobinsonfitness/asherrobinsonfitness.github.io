<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5">
    <title>Not a Fit | Asher Robinson Fitness</title>
    <meta name="robots" content="noindex,nofollow">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">

    <!-- Standard Favicons -->
    <link rel="icon" type="image/png" sizes="32x32" href="https://i.postimg.cc/QNSK2T81/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="https://i.postimg.cc/fW5SG9z9/favicon-16x16.png">

    <!-- JPG fallback favicon -->
    <link rel="shortcut icon" href="https://i.postimg.cc/7Y6JwZhJ/favicon.jpg">

    <!-- Apple / iOS -->
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/jqvnp7xz/apple-touch-icon.png">

    <!-- Android / PWA -->
    <link rel="icon" type="image/png" sizes="192x192" href="https://i.postimg.cc/xjgNwzfq/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="https://i.postimg.cc/BQ6P4nbK/android-chrome-512x512.png">

    <!-- Theme Color -->
    <meta name="theme-color" content="#000000">

    <style>
        :root {
            --space-2: 1rem;
            --space-4: 2rem;
            --space-5: 2.5rem;
            --space-6: 3rem;
            --desktop-grid-pad: 4rem;
            --primary: #06f;
            --text: #f8fafc;
            --text-secondary: #9ca3af;
            --payment-nav-h: 3rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
            font-display: swap;
        }

        body {
            color: var(--text);
            line-height: 1.5;
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            background: #1c1c1c;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .payment-nav {
            flex-shrink: 0;
            width: 100%;
            min-height: var(--payment-nav-h);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.625rem 1.25rem;
            background: #1c1c1c;
            border-bottom: 1px solid #3a3a3a;
            position: sticky;
            top: 0;
            z-index: 250;
        }

        .payment-nav--survey {
            justify-content: flex-start;
        }

        .payment-back {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: none;
            border: none;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-secondary, #9ca3af);
            cursor: pointer;
            padding: 0.3rem 0.5rem;
            margin: -0.3rem -0.5rem;
            line-height: 1;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            text-decoration: none;
            border-radius: 6px;
            transition: background-color 0.15s ease, color 0.15s ease;
        }

        @media (hover: hover) and (pointer: fine) {
            .payment-back:hover {
                background-color: rgba(235, 235, 235, 0.1);
                color: #f9fafb;
            }
        }

        .payment-back-icon {
            flex-shrink: 0;
            color: inherit;
        }

        @media (min-width: 761px) {
            .payment-nav {
                padding: 0.625rem 2rem;
            }
        }

        .headline {
            font-size: 1.75rem;
            font-weight: 600;
            line-height: 1.15;
            letter-spacing: -.02em;
            color: var(--text);
            margin-top: 0.5rem;
            margin-bottom: var(--space-2);
        }

        .subheadline {
            font-size: 1rem;
            line-height: 1.6;
            letter-spacing: -.005em;
            max-width: 450px;
            margin: 0 auto;
            margin-top: 0.25rem;
        }

        .not-a-fit-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: var(--space-5) 1.5rem;
        }

        .not-a-fit-inner {
            width: 100%;
            max-width: 480px;
        }

        @media (min-width: 1024px) {
            .headline {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <nav class="payment-nav payment-nav--survey" aria-label="Survey">
        <a class="payment-back" href="/survey" aria-label="Back to survey">
            <svg class="payment-back-icon" width="12" height="12" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2.25" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Apply for Coaching</span>
        </a>
    </nav>

    <main class="not-a-fit-main">
        <div class="not-a-fit-inner">
            <h1 class="headline" id="naf-heading">This program isn't the right fit.</h1>
            <p class="subheadline" id="naf-body" style="color: var(--text);"></p>
        </div>
    </main>

    <script>
        (function () {
            var params = new URLSearchParams(window.location.search || '');
            var goal = params.get('goal');
            var age = params.get('age');
            var gym = params.get('gym');
            var commitment = params.get('commitment');

            var body = '';

            if (goal === 'build_muscle' || goal === 'improve_fitness' || goal === 'not_sure') {
                body = "This is a fat loss program. If that’s not your goal right now, I’m not the right coach for you.";
            } else if (age === '17_or_younger') {
                body = "I work with men 18 and older. Come back when that changes.";
            } else if (age === '55_or_older') {
                body = "My coaching is built for men under 55. The targets and methods aren’t designed for your age range, and I’d rather be upfront than take your money and underdeliver.";
            } else if (gym === 'no' || gym === 'home') {
                body = "The training side of this program requires a commercial gym. Without it, I can’t get you the results I’d need to stand behind. If you get access to a gym, come back and reapply.";
            } else if (commitment === 'maybe' || commitment === 'no') {
                body = "Tracking food, bodyweight, and workouts isn’t optional. It’s how the program works. If you’re not ready for that, the results won’t be there. Come back when you are.";
            } else {
                body = "Based on your answers, this program isn’t the right fit for you right now.";
            }

            document.getElementById('naf-body').textContent = body;
        })();
    </script>
</body>

</html>
