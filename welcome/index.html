    /* Self-hosted Inter (SIL Open Font License) — same font on every device (Apple, Android, Windows) */
    @font-face{
      font-family:'Inter';
      font-style:normal;
      font-weight:100 900;
      font-display:swap;
      src:url('../fonts/inter-latin-variable.woff2') format('woff2');
    }
    *, *::before, *::after {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, sans-serif;
    }
    /* Tokens match index.html's root palette exactly, for visual congruence */
    :root {
      --text: #f8fafc;
      --muted: #a8afba;
    }
    /* html gets the same bg as body so mobile overscroll/rubber-banding never
       reveals a mismatched flash behind the short page content. */
    html { background: #1c1c1c; }
    body {
      color: var(--text); background: #1c1c1c; line-height: 1.5; font-size: 16px;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh; min-height: 100dvh;
      /* Top-down flow, not centered: the Calendly embed below is 700px tall,
         so a vertically-centered column would start off-screen. align-items
         still centers the column horizontally. */
      display: flex; flex-direction: column; align-items: center;
      /* Horizontal padding matches index.html's actual mobile hero padding
         (max(1rem, ...) resolves to 1rem below 640px); top padding matches
         index.html's --pad token, bottom keeps the prior --pad-sm value. */
      padding: 2.5rem 1rem 2rem;
    }
    .content { width: 100%; max-width: 440px; text-align: center; }
    /* Spacing rhythm matches index.html's hero exactly: .75rem (12px) between
       elements in the same group (index.html's headline↔subheadline↔subheadline2,
       btn↔pricing), 1.5rem (24px) at a section break (subheadline2→hero-media,
       hero-media→btn). The check icon uses 1rem (16px), the same value index.html
       used historically for a kicker-graphic sitting directly above a headline —
       tighter than a section break, looser than the tightest text-to-text pairing. */
    .check { margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; }
    .check svg { width: 56px; height: 56px; }
    h1 { font-size: 1.5rem; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 0.75rem; }
    .instructions {
      font-size: clamp(1rem, .93rem + .4vw, 1.125rem); color: var(--muted);
      line-height: 1.6; letter-spacing: -0.005em; margin-bottom: 1.5rem;
    }

    /* ── Light mode — same overrides as index.html ── */
    @media (prefers-color-scheme: light) {
      :root {
        --text: #111111;
        --muted: #4a4a4a;
      }
      html, body { background: #f7f7f7; }
    }

  <script type="text/javascript">
    (function (C, A, L) { let p = function (a, ar) { a.q.push(ar); }; let d = C.document; C.Cal = C.Cal || function () { let cal = C.Cal; let ar = arguments; if (!cal.loaded) { cal.ns = {}; cal.q = cal.q || []; d.head.appendChild(d.createElement("script")).src = A; cal.loaded = true; } if (ar[0] === L) { const api = function () { p(api, arguments); }; const namespace = ar[1]; api.q = api.q || []; if(typeof namespace === "string"){cal.ns[namespace] = cal.ns[namespace] || api;p(cal.ns[namespace], ar);p(cal, ["initNamespace", namespace]);} else p(cal, ar); return;} p(cal, ar); }; })(window, "https://app.cal.com/embed/embed.js", "init");
    Cal("init", "30min", {origin:"https://app.cal.com"});
    // Auto-forwards this page's ?name=&email= (appended by the Stripe
    // success redirect) straight into the booking form — no custom
    // prefill script needed.
    Cal.config = Cal.config || {};
    Cal.config.forwardQueryParams = true;

    Cal.ns["30min"]("inline", {
      elementOrSelector:"#my-cal-inline-30min",
      config: {"layout":"month_view","useSlotsViewOnSmallScreen":"true"},
      calLink: "asherrobinsonfitness/30min",
    });

    Cal.ns["30min"]("ui", {"cssVarsPerTheme":{"light":{"cal-brand":"#0066ff"},"dark":{"cal-brand":"#0066ff"}},"hideEventTypeDetails":true,"layout":"month_view"});

    // Redirect to the booked page ourselves the instant Cal.com reports a
    // completed booking, same reasoning as the prior Calendly/HubSpot
    // integrations: a same-origin redirect we trigger from our own script
    // skips any embed-side confirmation interstitial.
    var params = new URLSearchParams(window.location.search);
    var contactName = params.get('name');
    var contactEmail = params.get('email');
    Cal.ns["30min"]("on", {
      action: "bookingSuccessful",
      callback: function () {
        var qs = [];
        if (contactName) qs.push('name=' + encodeURIComponent(contactName));
        if (contactEmail) qs.push('email=' + encodeURIComponent(contactEmail));
        window.location.href = '/welcome/booked/' + (qs.length ? '?' + qs.join('&') : '');
      }
    });
